# QwickGuard Monitoring Stack
# Deploy on macmini (Docker): docker compose up -d
# Deploy on macmini (Podman): DOCKER_SOCKET=/run/user/501/podman/podman.sock podman compose up -d
# UIs accessible via Tailscale at http://macmini-devserver:<port>

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: qwickguard-socket-proxy
    restart: unless-stopped
    privileged: true
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      NETWORKS: 1
      VOLUMES: 1
      IMAGES: 1
      INFO: 1
      EVENTS: 1
      POST: 0
      DELETE: 0
    ports:
      - "127.0.0.1:2375:2375"
    networks:
      - proxy-internal
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  portainer:
    image: portainer/portainer-ce:lts
    container_name: qwickguard-portainer
    restart: unless-stopped
    command:
      - -H
      - tcp://qwickguard-socket-proxy:2375
      - --tlsskipverify
    volumes:
      - portainer_data:/data
    ports:
      - "9000:9000"
    networks:
      - proxy-internal
      - default
    depends_on:
      socket-proxy:
        condition: service_healthy

  dozzle:
    image: amir20/dozzle:latest
    container_name: qwickguard-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_REMOTE_HOST: tcp://qwickguard-socket-proxy:2375
      DOZZLE_NO_ANALYTICS: "true"
    ports:
      - "8888:8080"
    networks:
      - proxy-internal
      - default
    depends_on:
      socket-proxy:
        condition: service_healthy

  beszel:
    image: henrygd/beszel:latest
    container_name: qwickguard-beszel
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - beszel_data:/beszel_data
      - beszel_socket:/beszel_socket

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: qwickguard-beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - beszel_socket:/beszel_socket
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      KEY: "${BESZEL_AGENT_KEY}"

  brain:
    build:
      context: .
      dockerfile: brain/Dockerfile
    container_name: qwickguard-brain
    restart: unless-stopped
    ports:
      - "8500:8500"
    volumes:
      - brain_data:/data
      - ./docs/runbooks:/app/runbooks:ro
    environment:
      DATABASE_PATH: /data/qwickguard.db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: raajkumars/qwickguard
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    networks:
      - default

volumes:
  portainer_data:
  beszel_data:
  beszel_socket:
  brain_data:

networks:
  proxy-internal:
    driver: bridge
    internal: true
  default:
    driver: bridge
