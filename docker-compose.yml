# QwickGuard Monitoring Stack
# Deploy on macmini: docker compose up -d
# UIs accessible via Tailscale at http://macmini-devserver:<port>

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: qwickguard-socket-proxy
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      NETWORKS: 1
      VOLUMES: 1
      IMAGES: 1
      INFO: 1
      EVENTS: 1
      POST: 0
      DELETE: 0
    ports:
      - "127.0.0.1:2375:2375"
    networks:
      - qwickguard-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  portainer:
    image: portainer/portainer-ce:lts
    container_name: qwickguard-portainer
    restart: unless-stopped
    command:
      - -H
      - tcp://qwickguard-socket-proxy:2375
      - --tlsskipverify
    volumes:
      - portainer_data:/data
    ports:
      - "9000:9000"
    networks:
      - qwickguard-internal
    depends_on:
      socket-proxy:
        condition: service_healthy

  dozzle:
    image: amir20/dozzle:latest
    container_name: qwickguard-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_REMOTE_HOST: tcp://qwickguard-socket-proxy:2375
      DOZZLE_NO_ANALYTICS: "true"
    ports:
      - "8888:8080"
    networks:
      - qwickguard-internal
    depends_on:
      socket-proxy:
        condition: service_healthy

volumes:
  portainer_data:

networks:
  qwickguard-internal:
    driver: bridge
    internal: true
