{% extends "base.html" %}
{% set active_page = "runbooks" %}

{% block title %}{{ title }} — QwickGuard{% endblock %}
{% block header_title %}{{ title }}{% endblock %}

{% block content %}
<div style="margin-bottom:16px;">
  <a href="/runbooks" class="btn btn-outline" style="font-size:12px;">&#8592; Back to Runbooks</a>
</div>

<div class="card">
  <style>
    .runbook-content h1 { font-size:22px; font-weight:700; color:var(--text-primary); margin:24px 0 12px; }
    .runbook-content h1:first-child { margin-top:0; }
    .runbook-content h2 { font-size:18px; font-weight:600; color:var(--text-primary); margin:20px 0 10px; }
    .runbook-content h3 { font-size:15px; font-weight:600; color:var(--text-primary); margin:16px 0 8px; }
    .runbook-content p { color:var(--text-muted); margin:8px 0; line-height:1.7; }
    .runbook-content ul, .runbook-content ol { color:var(--text-muted); padding-left:24px; margin:8px 0; }
    .runbook-content li { margin:4px 0; line-height:1.6; }
    .runbook-content code { background:var(--bg-primary); color:var(--accent-green); padding:2px 6px; border-radius:4px; font-size:13px; }
    .runbook-content pre { background:var(--bg-primary); border:1px solid var(--border); border-radius:8px; padding:16px; overflow-x:auto; margin:12px 0; }
    .runbook-content pre code { background:none; padding:0; font-size:13px; line-height:1.6; color:var(--text-primary); }
    .runbook-content table { width:100%; border-collapse:collapse; margin:12px 0; }
    .runbook-content th { text-align:left; padding:8px 12px; border-bottom:1px solid var(--border); color:var(--text-dim); font-size:12px; text-transform:uppercase; }
    .runbook-content td { padding:8px 12px; border-bottom:1px solid rgba(42,42,68,0.5); color:var(--text-muted); }
    .runbook-content blockquote { border-left:3px solid var(--accent-green); padding:8px 16px; margin:12px 0; color:var(--text-muted); background:rgba(22,199,132,0.05); border-radius:0 6px 6px 0; }
    .runbook-content hr { border:none; border-top:1px solid var(--border); margin:20px 0; }
    .runbook-content a { color:var(--accent-blue); text-decoration:none; }
    .runbook-content a:hover { text-decoration:underline; }
    .runbook-content strong { color:var(--text-primary); }
  </style>
  <div class="runbook-content">
    {{ content | safe }}
  </div>
</div>
{% endblock %}
