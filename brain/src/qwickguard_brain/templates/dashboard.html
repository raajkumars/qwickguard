{% extends "base.html" %}

{% set active_page = "dashboard" %}

{% block title %}Dashboard — QwickGuard{% endblock %}
{% block header_title %}Dashboard{% endblock %}

{% block content %}
<div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
  <button id="refreshToggle" class="btn btn-outline" onclick="toggleRefresh()" style="font-size:11px; padding:4px 12px;">
    &#9646;&#9646; Pause
  </button>
  <span id="refreshStatus" style="font-size:11px; color:var(--text-dim);">Auto-refresh: 1s</span>
</div>

<div id="dashboard-content">
  {% include "partials/system_status.html" %}
</div>

<script>
let refreshInterval = null;
let refreshPaused = false;

async function refreshDashboard() {
  try {
    const resp = await fetch('/dashboard/partials/overview');
    if (resp.ok) {
      document.getElementById('dashboard-content').innerHTML = await resp.text();
    }
  } catch (e) { /* skip on error */ }
}

function startRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(refreshDashboard, 1000);
}

function toggleRefresh() {
  const btn = document.getElementById('refreshToggle');
  const status = document.getElementById('refreshStatus');
  refreshPaused = !refreshPaused;
  if (refreshPaused) {
    clearInterval(refreshInterval);
    refreshInterval = null;
    btn.innerHTML = '&#9654; Resume';
    status.textContent = 'Paused';
    status.style.color = 'var(--accent-orange)';
  } else {
    startRefresh();
    btn.innerHTML = '&#9646;&#9646; Pause';
    status.textContent = 'Auto-refresh: 1s';
    status.style.color = 'var(--text-dim)';
  }
}

startRefresh();
</script>
{% endblock %}
